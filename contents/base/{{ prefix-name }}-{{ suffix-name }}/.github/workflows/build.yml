on:
  - push
  - workflow_dispatch

permissions: write-all

name: Build

env:
  NODE_VERSION: "22.22.0"
  DOCKER_REGISTRY: ${{'{'}}{ vars.ARTIFACTORY_HOSTNAME }}
  DOCKER_REPOSITORY: ${{'{'}}{ vars.ARTIFACTORY_PROJECT }}-docker-local/applications
  IMAGE_NAME: {{ prefix-name }}-{{ suffix-name }}

jobs:
  build_and_deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: p6m-actions/js-pnpm-setup@v1
        with:
          node-version: ${{'{'}}{ env.NODE_VERSION }}

      - name: Cut Patch Version
        id: cut-patch
        uses: p6m-actions/js-pnpm-cut-tag@v1
        with:
          version-level: patch

      - name: Login to Docker Repository
        uses: p6m-actions/docker-repository-login@v1
        with:
          registry: ${{'{'}}{ vars.ARTIFACTORY_HOSTNAME }}
          username: ${{'{'}}{ secrets.ARTIFACTORY_USERNAME }}
          password: ${{'{'}}{ secrets.ARTIFACTORY_IDENTITY_TOKEN }}

      - name: Set up Docker Buildx
        id: buildx
        uses: p6m-actions/docker-buildx-setup@v1

      - name: Build and Publish Docker Image
        id: docker-publish
        uses: p6m-actions/docker-buildx-build-publish@v1
        with:
          image-name: ${{'{'}}{ env.IMAGE_NAME }}
          image-tag: ${{'{'}}{ github.sha }}
          registry: ${{'{'}}{ env.DOCKER_REGISTRY }}/${{'{'}}{ env.DOCKER_REPOSITORY }}
          platforms: linux/amd64,linux/arm64
          push: true
          skip-setup: true
          builder-name: ${{'{'}}{ steps.buildx.outputs.name }}
          secrets: |
            ARTIFACTORY_HOSTNAME=${{'{'}}{ vars.ARTIFACTORY_HOSTNAME }}
            ARTIFACTORY_TOKEN=${{'{'}}{ secrets.ARTIFACTORY_TOKEN }}
            artifactory-token=${{'{'}}{ secrets.ARTIFACTORY_TOKEN }}
            artifactory-username=${{'{'}}{ secrets.ARTIFACTORY_USERNAME }}
            artifactory-identity-token=${{'{'}}{ secrets.ARTIFACTORY_IDENTITY_TOKEN }}

      - name: Update Application Manifest
        uses: p6m-actions/platform-application-manifest-dispatch@v1
        with:
          repository: ${{'{'}}{ github.repository }}
          image-name: ${{'{'}}{ env.IMAGE_NAME }}
          environment: "dev"
          digest: ${{'{'}}{ steps.docker-publish.outputs.image-digest }}
          update-manifest-token: ${{'{'}}{ secrets.UPDATE_MANIFEST_TOKEN }}
          platform-dispatch-url: ${{'{'}}{ vars.PLATFORM_DISPATCH_URL }}
          directory-name: {{ prefix-name }}-{{ suffix-name }}
        if: always()
